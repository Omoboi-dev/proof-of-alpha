[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Robinhood Chain testnet (Arbitrum Orbit L2) — primary deploy target
[rpc_endpoints]
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com/rpc"

[etherscan]
# Blockscout explorer for contract verification on Robinhood Chain testnet
robinhood_testnet = { key = "any", url = "https://explorer.testnet.chain.robinhood.com/api", chain = 46630 }
